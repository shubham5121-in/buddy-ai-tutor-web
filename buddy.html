<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy - Smart Study AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-shadow: #4338ca;
            --secondary: #ec4899;
            --secondary-shadow: #be185d;
            --danger: #ef4444;
            --danger-shadow: #b91c1c;
            --bg-color: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
            --success: #10b981;
            --success-shadow: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            /* Playful, vibrant animated gradient background */
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 40px 32px;
            border-radius: 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 0 10px rgba(255, 255, 255, 0.4);
            position: relative;
            max-height: 92vh;
            overflow-y: auto;
        }

        /* Fun custom scrollbars */
        .app-container::-webkit-scrollbar { width: 10px; }
        .app-container::-webkit-scrollbar-track { background: transparent; }
        .app-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
            border: 3px solid white;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: -1px;
            text-shadow: 0 4px 0 #e0e7ff;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 800;
        }

        .screen {
            display: none;
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .active { display: block; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; }
        .input-row .input-group { margin-bottom: 0; }

        label {
            display: block;
            margin: 0 0 8px 6px;
            font-weight: 800;
            font-size: 1rem;
            color: #475569;
        }

        input, select, textarea {
            width: 100%;
            padding: 16px;
            border: 3px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus, select:focus, textarea:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 8px 0 #e0e7ff;
            transform: translateY(-2px);
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
            font-weight: 600;
        }

        /* --- 3D Buttons (Gamified Style) --- */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            position: relative;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            border-bottom: 6px solid var(--primary-shadow);
            margin-bottom: 6px;
        }

        .btn-start:active {
            border-bottom: 0px solid var(--primary-shadow);
            transform: translateY(6px);
            margin-bottom: 12px;
        }

        .btn-start:disabled {
            background: #94a3b8;
            border-bottom: 6px solid #64748b;
            cursor: not-allowed;
            transform: none !important;
            margin-bottom: 6px !important;
        }

        /* --- 3D Question Cards --- */
        .question-card {
            background: white;
            padding: 28px;
            border-radius: 28px;
            border: 3px solid #e2e8f0;
            margin: 0 0 35px 0;
            box-shadow: 0 8px 0 #e2e8f0;
            position: relative;
        }

        .question-card::before {
            content: attr(data-index);
            position: absolute;
            top: -15px;
            left: -15px;
            background: var(--secondary);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.3rem;
            border: 4px solid white;
            box-shadow: 0 4px 0 var(--secondary-shadow);
        }

        .q-text {
            color: #0f172a;
            line-height: 1.6;
            margin-bottom: 18px;
            font-weight: 800;
            font-size: 1.25rem;
        }

        textarea.answer-input {
            margin-top: 4px;
            min-height: 120px;
            resize: vertical;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .btn-small {
            padding: 14px 14px;
            font-size: 1.05rem;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.1s;
            flex-grow: 1;
            margin-bottom: 4px;
        }

        .btn-mic-small { 
            background: #fee2e2; 
            color: #dc2626; 
            border-bottom: 4px solid #f87171;
        }
        .btn-mic-small:active {
            border-bottom: 0px;
            transform: translateY(4px);
            margin-bottom: 8px;
        }
        .btn-mic-small.listening { 
            background: var(--danger); 
            color: white; 
            border-bottom: 4px solid var(--danger-shadow);
            animation: pulse-mic 1.2s infinite; 
        }

        .btn-cam-small { 
            background: #e0e7ff; 
            color: #4f46e5; 
            border-bottom: 4px solid #818cf8;
        }
        .btn-cam-small:active {
            border-bottom: 0px;
            transform: translateY(4px);
            margin-bottom: 8px;
        }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .img-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 16px;
            border: 3px solid #e2e8f0;
            margin-top: 20px;
            display: none;
            object-fit: cover;
        }

        /* --- Score & Feedback UI --- */
        .score-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .score-label {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score {
            font-size: 5.5rem;
            font-weight: 900;
            color: var(--success);
            text-shadow: 0 6px 0 var(--success-shadow);
            line-height: 1.1;
            margin-top: 10px;
        }

        .feedback-area {
            line-height: 1.7;
            background: white;
            padding: 30px;
            border-radius: 24px;
            border: 4px solid #86efac;
            box-shadow: 0 8px 0 #86efac;
            color: #166534;
            margin-bottom: 40px;
            font-size: 1.2rem;
            font-weight: 800;
            white-space: pre-wrap;
        }

        .status-msg {
            text-align: center;
            font-size: 1.05rem;
            color: #64748b;
            margin-top: 25px;
            font-weight: 800;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border-bottom: 6px solid #cbd5e1;
            margin-bottom: 6px;
        }
        .btn-secondary:active {
            border-bottom: 0px solid #cbd5e1;
            transform: translateY(6px);
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h1 id="app-title">Buddy 🐾</h1>
        <p class="subtitle">Exam Knowledge Checker</p>

        <div id="screen-setup" class="screen active">
            
            <div class="input-row">
                <div class="input-group">
                    <label>Language / Medium</label>
                    <select id="medium-select">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi / हिंदी</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Questions</label>
                    <select id="count-select">
                        <option value="1">1 (Single)</option>
                        <option value="3">3 (Multi)</option>
                        <option value="5">5 (Multi)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Your Class</label>
                <select id="class-select">
                    <script>for (let i = 1; i <= 12; i++) document.write(`<option value="${i}">Class ${i}</option>`)</script>
                </select>
            </div>

            <div class="input-group">
                <label>Subject</label>
                <input type="text" id="subject-input" placeholder="e.g. Science, History">
            </div>

            <div class="input-group">
                <label>Chapter / Topic</label>
                <input type="text" id="chapter-input" placeholder="e.g. Water Cycle, Algebra">
            </div>

            <button class="btn btn-start" onclick="generateQuestions()">Get Questions ✨</button>
            <p id="setup-status-msg" class="status-msg"></p>
        </div>

        <div id="screen-quiz" class="screen">
            <p id="quiz-status-msg" class="status-msg" style="margin-top:0; margin-bottom: 25px;"></p>
            
            <div id="questions-container">
                <!-- Dynamic questions injected here -->
            </div>

            <button id="submit-all-btn" class="btn btn-start" style="display:none;" onclick="evaluateAll()">Grade All Answers 🎯</button>
            <p id="eval-status-msg" class="status-msg"></p>
        </div>

        <div id="screen-result" class="screen">
            <div class="score-container">
                <div class="score-label">Your Final Score</div>
                <div class="score" id="display-score">--/--</div>
            </div>
            
            <div class="feedback-area" id="display-feedback"></div>
            
            <button class="btn btn-start" onclick="location.reload()">Start New Quiz 🔄</button>
        </div>
    </div>

    <script type="module">
        // --- OPENROUTER API INTEGRATION ---
        const API_KEY = "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";

        const modelsToTry = [
            "google/gemini-2.5-flash",
            "google/gemini-2.0-flash-001",
            "google/gemini-1.5-flash"
        ];
        let workingModel = null;

        async function callOpenRouter(payload) {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`OpenRouter Error ${response.status}: ${await response.text()}`);
            }
            const data = await response.json();
            return {
                response: {
                    text: () => data.choices[0].message.content
                }
            };
        }

        // --- MULTIMODAL API FALLBACK ---
        async function generateContentWithFallback(promptData) {
            let contentArray = [];
            
            if (Array.isArray(promptData)) {
                promptData.forEach(part => {
                    if (typeof part === 'string') {
                        contentArray.push({ type: "text", text: part });
                    } else if (part.inlineData) {
                        contentArray.push({
                            type: "image_url",
                            image_url: {
                                url: `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`
                            }
                        });
                    }
                });
            } else {
                contentArray.push({ type: "text", text: promptData });
            }

            const payload = { messages: [{ role: "user", content: contentArray }] };

            if (workingModel) {
                payload.model = workingModel;
                return await callOpenRouter(payload);
            }
            
            for (const modelName of modelsToTry) {
                try {
                    console.log("Trying model: " + modelName);
                    payload.model = modelName;
                    const result = await callOpenRouter(payload);
                    workingModel = modelName;
                    console.log("Successfully connected to: " + modelName);
                    return result;
                } catch (e) {
                    console.warn(`Model ${modelName} failed:`, e?.message || e);
                }
            }
            throw new Error("No supported AI models found for this API Key.");
        }

        // --- STATE ---
        let questionsList = [];
        let imagesData = {}; // Map question index -> { data: base64, mimeType: type }

        let recognition;
        let isListening = false;
        let activeAudioIndex = null;
        let originalText = "";

        // --- GENERATE QUESTIONS ---
        window.generateQuestions = async () => {
            const cls = document.getElementById('class-select').value;
            const sub = document.getElementById('subject-input').value || "General Knowledge";
            const ch = document.getElementById('chapter-input').value || "Basics";
            const medium = document.getElementById('medium-select').value;
            const count = parseInt(document.getElementById('count-select').value);

            document.getElementById('setup-status-msg').innerText = `Buddy is writing ${count} question(s) in ${medium}... Please wait.`;
            document.querySelector('.btn-start').disabled = true;

            let prompt = `You are Buddy, a friendly exam tutor. Generate ${count} clear question(s) for a Class ${cls} student about ${sub}: ${ch}. The language medium MUST be ${medium}. `;
            if (count > 1) {
                prompt += `CRITICAL: Output exactly ${count} separate questions. Separate each question with exactly three dashes (---). Do NOT add numbers or any conversational filler. Just the question text separated by ---.`;
            } else {
                prompt += `Just output the question text. Do not answer it.`;
            }

            try {
                const result = await generateContentWithFallback(prompt);
                let text = result.response.text();
                
                if (count > 1) {
                    questionsList = text.split('---').map(q => q.trim()).filter(q => q.length > 5);
                } else {
                    questionsList = [text.trim()];
                }
                
                if (questionsList.length === 0) questionsList = [text.trim()]; // Fallback
                
                renderQuestionsUI();
            } catch (err) {
                document.getElementById('setup-status-msg').innerText = "Error interacting with AI. Check console for details.";
                document.querySelector('.btn-start').disabled = false;
                console.error(err);
            }
        };

        // --- RENDER QUESTIONS LIST ---
        function renderQuestionsUI() {
            changeScreen('screen-quiz');
            document.getElementById('quiz-status-msg').innerText = `Scroll down and answer all questions then hit Grade All Answers.`;
            document.getElementById('submit-all-btn').style.display = 'flex';

            const container = document.getElementById('questions-container');
            container.innerHTML = "";
            imagesData = {}; // Reset images
            activeAudioIndex = null;
            isListening = false;

            questionsList.forEach((q, idx) => {
                container.innerHTML += `
                    <div class="question-card" data-index="${idx + 1}">
                        <p class="q-text">${q}</p>
                        
                        <textarea id="answer-text-${idx}" class="answer-input" placeholder="Type your answer, tap Dictate, or upload a Photo..."></textarea>
                        
                        <div class="action-row">
                            <button class="btn-small btn-mic-small" id="mic-btn-${idx}" onclick="toggleMic(${idx})">🎤 Dictate</button>
                            
                            <label class="btn-small btn-cam-small">
                                📷 Add Photo
                                <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event, ${idx})">
                            </label>
                        </div>
                        
                        <img id="img-preview-${idx}" class="img-preview" />
                    </div>
                `;
            });
        }

        // --- IMAGE HANDLING ---
        window.handleImageUpload = (event, index) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                // Save Base64 payload for Gemini Multimodal
                const base64str = e.target.result.split(',')[1];
                imagesData[index] = {
                    data: base64str,
                    mimeType: file.type
                };
                
                // Show Image Preview in UI
                const imgEl = document.getElementById(`img-preview-${index}`);
                imgEl.src = e.target.result;
                imgEl.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        // --- VOICE LOGIC ---
        window.toggleMic = (index) => {
            if (isListening) {
                recognition.stop();
                
                // Instantly reset the previously active mic button UI
                if (activeAudioIndex !== null) {
                    const btn = document.getElementById('mic-btn-' + activeAudioIndex);
                    if (btn) {
                        btn.innerText = "🎤 Dictate";
                        btn.classList.remove('listening');
                    }
                }
                
                // If the user clicked the SAME mic button, turn it off and abort to stop.
                if (activeAudioIndex === index) {
                    activeAudioIndex = null;
                    return; 
                }
            }

            activeAudioIndex = index;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Use Chrome or Edge for Voice features!"); return; }

            recognition = new SpeechRecognition();
            const medium = document.getElementById('medium-select').value;
            recognition.lang = medium === "Hindi" ? "hi-IN" : "en-US";
            recognition.continuous = true;
            recognition.interimResults = true;

            const micBtn = document.getElementById('mic-btn-' + index);
            const textarea = document.getElementById('answer-text-' + index);
            
            // To allow seamless appending to existing typed/dictated text
            originalText = textarea.value;

            recognition.onstart = () => {
                isListening = true;
                micBtn.innerText = "🛑 Stop Dictation";
                micBtn.classList.add('listening');
            };

            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    interim += event.results[i][0].transcript;
                }
                textarea.value = (originalText ? originalText + " " : "") + interim;
            };

            recognition.onend = () => {
                isListening = false;
                if (activeAudioIndex === index) {
                     micBtn.innerText = "🎤 Dictate";
                     micBtn.classList.remove('listening');
                     activeAudioIndex = null;
                }
            };

            try { recognition.start(); } catch (e) { console.error(e); }
        };

        // --- EVALUATE ALL MULTIMODAL ---
        window.evaluateAll = async () => {
            document.getElementById('eval-status-msg').innerText = "Buddy is analyzing all your answers & photos... 🧠";
            document.getElementById('submit-all-btn').style.display = 'none';
            document.getElementById('submit-all-btn').disabled = true;

            const cls = document.getElementById('class-select').value;
            const medium = document.getElementById('medium-select').value;
            const maxScore = questionsList.length * 10;

            let promptParts = [];
            
            let textHeader = `Student Class: ${cls}\n`;
            textHeader += `Medium: ${medium}\n\n`;
            textHeader += `Evaluate as a friendly tutor responding entirely in the ${medium} language.\n`;
            textHeader += `1. First line MUST be the final combined score in this format: Score: X/${maxScore}\n`;
            textHeader += `2. Tell them what they got right overall.\n`;
            textHeader += `3. Tell them exactly what they missed or need to improve across the questions. (Keep it short and extremely encouraging)\n\n`;
            textHeader += `Here are the questions and the student's answers (they provided text, photos of notebooks, or both):\n`;
            promptParts.push(textHeader);

            for (let i = 0; i < questionsList.length; i++) {
                const answerText = document.getElementById(`answer-text-${i}`).value.trim();
                let qStr = `Question ${i + 1}: "${questionsList[i]}"\nStudent Typed/Dictated Answer: "${answerText || 'Did not type/dictate anything. See attached photo.'}"\n`;
                
                if (imagesData[i]) {
                    qStr += `Student Uploaded Photo for Question ${i + 1}:\n`;
                    promptParts.push(qStr);
                    // Pass the base64 multimodal object natively supported by the Gemini SDK
                    promptParts.push({
                        inlineData: {
                            data: imagesData[i].data,
                            mimeType: imagesData[i].mimeType
                        }
                    });
                    promptParts.push("\n");
                } else {
                    promptParts.push(qStr + "\n");
                }
            }

            try {
                // Send the Multimodal array
                const result = await generateContentWithFallback(promptParts);
                const feedback = result.response.text();
                
                // Extract Score logic
                const scoreRegex = new RegExp(`\\d+\\/${maxScore}`);
                const generalScoreRegex = /\d+\/\d+/;
                const scoreMatch = feedback.match(scoreRegex) || feedback.match(generalScoreRegex) || [`?/${maxScore}`];

                const finalScoreStr = scoreMatch[0];
                document.getElementById('display-score').innerText = finalScoreStr;
                
                document.getElementById('display-score').style.fontSize = finalScoreStr.length > 5 ? "3.2rem" : "5.5rem"; 
                
                let cleanFeedback = feedback.replace(new RegExp(`Score:\\s*${finalScoreStr}`, 'i'), '');
                cleanFeedback = cleanFeedback.replace(finalScoreStr, '').trim();
                
                document.getElementById('display-feedback').innerText = cleanFeedback;
                
                changeScreen('screen-result');
                document.getElementById('eval-status-msg').innerText = "";
            } catch (err) {
                alert("Analysis failed. Try again.");
                document.getElementById('eval-status-msg').innerText = "Error analyzing. Check console.";
                document.getElementById('submit-all-btn').style.display = 'flex';
                document.getElementById('submit-all-btn').disabled = false;
                console.error(err);
            }
        };

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>

</html>
